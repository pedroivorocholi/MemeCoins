name: Memecoin Screener

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:         # also keep manual trigger

jobs:
  screen:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to push the seen-tokens cache back

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        run: python screener.py
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          # Optional: override the ntfy server
          # NTFY_SERVER: ${{ secrets.NTFY_SERVER }}

      - name: Persist seen-tokens cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p cache
          git add cache/seen.json
          git diff --staged --quiet || git commit -m "chore: update seen-tokens cache [skip ci]"
          git push
